<!doctype html><html lang="de"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>hacker-ui · cyberdeck</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=JetBrains+Mono:wght@400;500&display=swap');
:root{--bg:#0A0A0F;--panel:#12121A;--panel-2:#1C1C2E;--border:#2A2A3A;--fg:#E0E0E0;
--muted:#8B8B9E;--accent:#00FF88;--accent2:#FF00FF;--accent3:#00D4FF;--err:#FF3366;
--font:'JetBrains Mono',monospace;--head:'Orbitron',sans-serif}
body{margin:0;background:var(--bg);color:var(--fg);font:14px/1.5 var(--font);padding:24px}
@media (prefers-reduced-motion:no-preference){
body::before{content:"";position:fixed;inset:0;pointer-events:none;z-index:9999;opacity:.05;
background:repeating-linear-gradient(0deg,transparent 0 2px,#000 2px 3px)}
.glitch:active{animation:glitch .25s steps(2) both}
@keyframes glitch{25%{transform:translateX(2px)}75%{transform:translateX(-2px)}}}
.wrap{max-width:1100px;margin:0 auto}
h1{font-family:var(--head);letter-spacing:.18em;text-transform:uppercase;font-size:20px;margin:0 0 4px}
.sub{color:var(--muted);font-size:12px;letter-spacing:.1em;margin-bottom:22px}
.neon{color:var(--accent);text-shadow:0 0 6px rgb(0 255 136/.6),0 0 20px rgb(0 255 136/.25)}
.neon.m{color:var(--accent2);text-shadow:0 0 6px rgb(255 0 255/.6)}
.neon.c{color:var(--accent3);text-shadow:0 0 6px rgb(0 212 255/.6)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px}
.panel{background:var(--panel);border:1px solid var(--border);padding:16px;
clip-path:polygon(12px 0,100% 0,100% calc(100% - 12px),calc(100% - 12px) 100%,0 100%,0 12px)}
.hud{position:relative}
.hud::before,.hud::after{content:"";position:absolute;width:14px;height:14px;pointer-events:none}
.hud::before{top:-1px;left:-1px;border-top:2px solid var(--accent);border-left:2px solid var(--accent)}
.hud::after{bottom:-1px;right:-1px;border-bottom:2px solid var(--accent);border-right:2px solid var(--accent)}
.panel h2{font-family:var(--head);font-size:12px;letter-spacing:.15em;text-transform:uppercase;
margin:0 0 14px;color:var(--muted)}
.big{font-size:30px;font-weight:500;font-variant-numeric:tabular-nums}
.bar{height:6px;background:var(--panel-2);margin:10px 0 4px}
.bar i{display:block;height:100%;background:var(--accent);box-shadow:0 0 8px rgb(0 255 136/.5)}
.bar.c i{background:var(--accent3);box-shadow:0 0 8px rgb(0 212 255/.5)}
.row{display:flex;justify-content:space-between;font-size:12px;color:var(--muted);padding:5px 0}
.row b{color:var(--fg);font-weight:500}
.btn{font:600 13px var(--font);letter-spacing:.1em;text-transform:uppercase;cursor:pointer;
background:transparent;color:var(--accent);border:1px solid var(--accent);padding:10px 18px;
clip-path:polygon(8px 0,100% 0,100% calc(100% - 8px),calc(100% - 8px) 100%,0 100%,0 8px);transition:all .15s}
.btn:hover{background:var(--accent);color:#04120A;box-shadow:0 0 18px rgb(0 255 136/.45)}
.btn.alt{color:var(--accent3);border-color:var(--accent3)}
.btn.alt:hover{background:var(--accent3);color:#03121A;box-shadow:0 0 18px rgb(0 212 255/.45)}
:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
.actions{display:flex;gap:10px;margin-top:16px}
</style></head><body><div class="wrap">
<h1 class="neon">System Status</h1>
<div class="sub">NODE CLUSTER // <span class="neon c">DC-01</span> // UPLINK <span class="neon">ACTIVE</span></div>
<div class="grid">
<div class="panel hud"><h2>Compute // pve-dc</h2>
<div class="big neon">78<span style="font-size:14px">%</span></div>
<div class="bar"><i style="width:78%"></i></div>
<div class="row"><span>VMS</span><b>11 RUNNING</b></div>
<div class="row"><span>LOAD</span><b>6.42</b></div>
<div class="actions"><button class="btn glitch">Engage</button><button class="btn alt">Scan</button></div></div>
<div class="panel"><h2>Network // Tunnel</h2>
<div class="big neon c">1.5<span style="font-size:14px">ms</span></div>
<div class="bar c"><i style="width:34%"></i></div>
<div class="row"><span>WG-S2S</span><b class="neon" style="font-size:12px">LINKED</b></div>
<div class="row"><span>THROUGHPUT</span><b>412 Mbit/s</b></div>
<div class="actions"><button class="btn alt glitch">Trace</button></div></div>
<div class="panel"><h2>Inference // GPU Grid</h2>
<div class="big neon m">3<span style="font-size:14px">/3</span></div>
<div class="row"><span>DGX SPARK</span><b>qwen · 41 tok/s</b></div>
<div class="row"><span>AI-GPU-01</span><b>mistral · 38 tok/s</b></div>
<div class="row"><span>AI-GPU-02</span><b>idle</b></div>
<div class="actions"><button class="btn glitch">Dispatch</button></div></div>
</div></div></body></html>
